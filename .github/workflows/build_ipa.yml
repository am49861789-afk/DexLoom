name: Build DexLoom IPA

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    name: Build Unsigned IPA
    runs-on: macos-latest 

    steps:
      - name: 📥 检出代码 (Checkout Repository)
        uses: actions/checkout@v4

      - name: 🛠️ 确保使用最新的 Xcode (Setup Xcode)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: 🛠️ 降级最低 iOS 版本到 16.0
        run: |
          echo "自动修改 project.pbxproj 的部署目标为 iOS 16.0..."
          PROJECT_PBXPROJ=$(find . -name "project.pbxproj" | head -n 1)
          if [ -n "$PROJECT_PBXPROJ" ]; then
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' "$PROJECT_PBXPROJ"
            echo "版本号修改成功！"
          fi

      - name: 🏗️ 编译项目 (Build iOS App)
        run: |
          echo "查找 Xcode 项目文件..."
          PROJECT_PATH=$(find . -name "DexLoom.xcodeproj" | head -n 1)
          
          if [ -z "$PROJECT_PATH" ]; then
            echo "错误: 找不到 DexLoom.xcodeproj 文件！请检查仓库代码是否完整。"
            exit 1
          fi
          
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          echo "找到项目所在目录: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          
          echo "当前使用的 Xcode 版本信息："
          xcodebuild -version
          
          echo "开始执行免签名编译..."
          xcodebuild clean build \
            -project DexLoom.xcodeproj \
            -scheme DexLoom \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: 📦 打包为 IPA (Package to IPA)
        run: |
          echo "组装 IPA 文件结构..."
          PROJECT_DIR=$(dirname $(find . -name "DexLoom.xcodeproj" | head -n 1))
          APP_PATH="$PROJECT_DIR/build/Build/Products/Release-iphoneos/DexLoom.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "错误: 找不到编译后的 .app 文件！请检查上方 xcodebuild 日志。"
            exit 1
          fi
          
          mkdir -p Payload
          mv "$APP_PATH" Payload/
          zip -qr DexLoom.ipa Payload
          
          echo "打包完成！"

      - name: 📤 上传 IPA 制品 (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: DexLoom-Release-IPA
          path: DexLoom.ipa
          retention-days: 7
