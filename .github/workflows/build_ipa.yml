name: Build DexLoom IPA

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-unsigned-ipa:
    name: Build Unsigned IPA
    # 关键修改：使用最新的 macOS 环境以确保自带 Xcode 16+
    runs-on: macos-latest 

    steps:
      - name: 📥 检出代码 (Checkout Repository)
        uses: actions/checkout@v4

      - name: 🛠️ 确保使用最新的 Xcode (Setup Xcode)
        # 强制选择系统中已安装的最新版本 Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: 🏗️ 编译项目 (Build iOS App)
        run: |
          echo "查找 Xcode 项目文件..."
          # 自动搜索 DexLoom.xcodeproj 所在的相对路径
          PROJECT_PATH=$(find . -name "DexLoom.xcodeproj" | head -n 1)
          
          if [ -z "$PROJECT_PATH" ]; then
            echo "错误: 找不到 DexLoom.xcodeproj 文件！请检查仓库代码是否完整。"
            exit 1
          fi
          
          PROJECT_DIR=$(dirname "$PROJECT_PATH")
          echo "找到项目所在目录: $PROJECT_DIR"
          
          # 进入项目所在目录
          cd "$PROJECT_DIR"
          
          echo "当前使用的 Xcode 版本信息："
          xcodebuild -version
          
          echo "开始执行免签名编译..."
          xcodebuild clean build \
            -project DexLoom.xcodeproj \
            -scheme DexLoom \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: 📦 打包为 IPA (Package to IPA)
        run: |
          echo "组装 IPA 文件结构..."
          # 再次定位目录，找到编译出的产物
          PROJECT_DIR=$(dirname $(find . -name "DexLoom.xcodeproj" | head -n 1))
          APP_PATH="$PROJECT_DIR/build/Build/Products/Release-iphoneos/DexLoom.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "错误: 找不到编译后的 .app 文件！请检查上方 xcodebuild 日志。"
            exit 1
          fi
          
          # 在当前(根)目录创建 Payload 文件夹并打包
          mkdir -p Payload
          mv "$APP_PATH" Payload/
          zip -qr DexLoom.ipa Payload
          
          echo "打包完成！"

      - name: 📤 上传 IPA 制品 (Upload Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: DexLoom-Release-IPA
          path: DexLoom.ipa
          retention-days: 7
